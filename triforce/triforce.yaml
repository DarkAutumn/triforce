action-spaces:
  basic:
    default: true
    actions:
    - MOVE
    - SWORD
    - BEAMS
  move-only:
    actions:
    - MOVE
  all-items:
    actions:
    - MOVE
    - SWORD
    - BEAMS
    - BOMBS
    - BOOMERANG
model-kinds:
  shared-nature:
    default: true
    class: SharedNatureAgent
  multihead:
    class: MultiHeadAgent
  impala-shared:
    class: ImpalaSharedAgent
  impala-multihead:
    class: ImpalaMultiHeadAgent
training-circuits:
- name: main-circuit
  description: 'Train the overworld model through curriculum: room navigation, sword pickup, overworld traversal, dungeon
    1, then full game.'
  scenarios:
  - scenario: overworld-room-walk
    exit-criteria:
      metric: room-result/correct-exit
      threshold: 0.9
    iterations: 500000
  - scenario: overworld-sword
    exit-criteria:
      metric: success-rate
      threshold: 0.8
    iterations: 500000
  - scenario: overworld-skip-sword
    exit-criteria:
      metric: success-rate
      threshold: 0.9
    iterations: 2000000
  - scenario: dungeon1
    exit-criteria:
      metric: success-rate
      threshold: 0.9
    iterations: 2000000
  - scenario: full-game
- name: dungeon1-circuit
  description: Train the dungeon model by first teaching it to walk rooms, then to make it to dungeon1, then to grab the sword,
    then all together.
  scenarios:
  - scenario: dungeon1-skip-opening
    exit-criteria:
      metric: rewards
      threshold: 0.0
    iterations: 2000000
  - scenario: dungeon1-entry-room
    exit-criteria:
      metric: room-result/correct-exit
      threshold: 0.9
  - scenario: dungeon1-side-room-opening
    exit-criteria:
      metric: success-rate
      threshold: 0.85
  - scenario: dungeon1-wallmaster
    exit-criteria:
      metric: success-rate
      threshold: 0.85
  - scenario: dungeon1-entry-room
    exit-criteria:
      metric: room-result/correct-exit
      threshold: 0.9
  - scenario: dungeon1
    iterations: 20000000
- name: polish
  kind: weighted
  description: Polish a trained model by mixing full-game with targeted scenarios to prevent
    catastrophic forgetting while improving weak areas.
  scenarios:
  - scenario: full-game
    weight: 92
  - scenario: dungeon1
    weight: 5
  - scenario: dungeon1-wallmaster
    weight: 2
  - scenario: overworld-sword
    weight: 1
- name: all-items-circuit
  description: 'Train a model with all items: mirrors main-circuit but with all-items
    scenario variants that equip boomerang, bombs, arrows, wand, and candle.'
  scenarios:
  - scenario: overworld-room-walk
    exit-criteria:
      metric: room-result/correct-exit
      threshold: 0.9
    iterations: 500000
  - scenario: overworld-sword
    exit-criteria:
      metric: success-rate
      threshold: 0.8
    iterations: 500000
  - scenario: overworld-skip-sword-all-items
    exit-criteria:
      metric: success-rate
      threshold: 0.9
    iterations: 2000000
  - scenario: dungeon1-all-items
    exit-criteria:
      metric: success-rate
      threshold: 0.9
    iterations: 2000000
  - scenario: full-game-all-items
- name: check-for-reward-hacking
  description: 'Quick circuit for validating reward hacking fixes: room-walk then
    overworld navigation with all items.'
  scenarios:
  - scenario: overworld-room-walk
    iterations: 500000
  - scenario: overworld-skip-sword-all-items
    iterations: 750000
scenarios:
- name: full-game
  description: Full game from start through dungeon 1 triforce
  iterations: 2000000
  scenario_selector: round-robin
  objective: GameCompletion
  critic: GameplayCritic
  end_conditions:
  - GainedTriforce
  - GameOver
  - Timeout
  metrics:
  - success-rate
  - game-progress
  - room-health
  - ending
  - reward-average
  - reward-details
  start:
  - 0_77c
  use_hints: true
- name: skip-sword-to-triforce
  description: Overworld through dungeon 1 triforce, skipping the sword cave
